<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем иконки -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <button class="btn-new-chat" onclick="createNewChat()">
                <i data-lucide="plus"></i> Новый чат
            </button>
            
            <div class="history-section">
                <p class="label">История</p>
                <div id="chat-history-list"></div>
            </div>

            <div class="sidebar-footer">
                <input type="password" id="api-key-input" placeholder="Введите API Key...">
                <div class="status-dot"></div>
            </div>
        </aside>

        <!-- Основная часть -->
        <main class="main-content">
            <header class="chat-header">
                <h2>AI Assistant v2.0</h2>
                <div class="model-badge">GPT-4o / Gemini</div>
            </header>

            <div id="chat-display" class="chat-display">
                <div class="welcome-screen">
                    <h1>Чем я могу помочь?</h1>
                    <p>Введите ваш API ключ внизу слева и начните общение.</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-text" placeholder="Спросите о чем угодно..." rows="1"></textarea>
                    <button id="send-btn"><i data-lucide="send"></i></button>
                </div>
                <p class="disclaimer">ИИ может ошибаться. Проверяйте важную информацию.</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
